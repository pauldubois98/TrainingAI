<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neural Network Sandbox</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f9f9f9;
            color: #333;
            padding: 2em;
        }
        h1 {
            color: white;
            background-color: black;
            padding: 0.3em 0.6em;
            text-align: center;
            font-size: 1.8em;
            margin-bottom: 1em;
        }
        .control-group {
            margin-bottom: 2em;
            text-align: center;
        }
        .network-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 100%;
            max-width: 600px;
            background: white;
            border: 1px solid #ccc;
            padding: 2em;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            position: relative;
        }
        #network_svg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            overflow: visible;
        }
        .layer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5em;
        }
        .neuron {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            background-color: white;
            transition: background-color 0.2s;
            position: relative;
            z-index: 1;
        }
        .neuron.active {
            background-color: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }
        .neuron.clickable {
            cursor: pointer;
            user-select: none;
        }
        .neuron.clickable:hover {
            transform: scale(1.05);
        }
        .sliders-container {
            margin-top: 2em;
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 1em;
        }
        .slider-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1em;
        }
        input[type="range"] {
            flex-grow: 1;
            max-width: 250px;
        }
        label {
            font-size: 0.9em;
            font-family: monospace;
        }
        h3 {
            margin: 1em 0 0.5em 0;
            border-bottom: 1px solid #ccc;
            padding-bottom: 0.2em;
        }
    </style>
</head>
<body>

    <h1>NN Sandbox</h1>

    <div class="control-group">
        <label for="hidden_count">Hidden Neurons (1-10): </label>
        <input type="number" id="hidden_count" min="1" max="10" value="3" onchange="initNetwork()">
    </div>

    <div class="network-container">
        <svg id="network_svg"></svg>
        <div class="layer">
            <div>Inputs</div>
            <div id="input_0" class="neuron clickable" onclick="toggleInput(0)">0</div>
            <div id="input_1" class="neuron clickable" onclick="toggleInput(1)">0</div>
        </div>

        <div class="layer">
            <div>Hidden</div>
            <div id="hidden_layer_neurons" class="layer" style="gap: 0.8em;">
                </div>
        </div>

        <div class="layer">
            <div>Output</div>
            <div id="output_0" class="neuron">0</div>
        </div>
    </div>

    <div class="sliders-container">
        <h3>Input → Hidden Weights</h3>
        <div id="input_weights_sliders"></div>

        <h3>Hidden Biases</h3>
        <div id="hidden_biases_sliders"></div>

        <h3>Hidden → Output Weights</h3>
        <div id="hidden_weights_sliders"></div>

        <h3>Output Bias</h3>
        <div id="output_bias_slider"></div>
    </div>

    <script>
        // State variables
        let inputs = [0, 0];
        let numHidden = 3;
        let weightsIn = [];   // 2D Array: weightsIn[input_idx][hidden_idx]
        let weightsOut = [];  // 1D Array: weightsOut[hidden_idx]
        let biasesHidden = []; // 1D Array: biasesHidden[hidden_idx]
        let biasOut = 0;

        // Initialize weights and dynamic DOM elements
        function initNetwork() {
            const inputCountEl = document.getElementById('hidden_count');
            numHidden = Math.max(1, Math.min(10, parseInt(inputCountEl.value) || 3));
            inputCountEl.value = numHidden;

            // Initialize weights and biases with defaults
            weightsIn = [new Array(numHidden).fill(0.0), new Array(numHidden).fill(0.0)];
            weightsOut = new Array(numHidden).fill(0.0);
            biasesHidden = new Array(numHidden).fill(0.0);
            biasOut = 0.0;

            renderNeurons();
            renderSliders();
            updateNetwork();
        }

        function toggleInput(index) {
            inputs[index] = inputs[index] === 0 ? 1 : 0;
            const btn = document.getElementById(`input_${index}`);
            btn.textContent = inputs[index];
            if(inputs[index] === 1) btn.classList.add('active');
            else btn.classList.remove('active');
            
            updateNetwork();
        }

        function renderNeurons() {
            const hiddenContainer = document.getElementById('hidden_layer_neurons');
            hiddenContainer.innerHTML = '';
            for (let i = 0; i < numHidden; i++) {
                const neuron = document.createElement('div');
                neuron.id = `hidden_${i}`;
                neuron.className = 'neuron';
                neuron.textContent = '0';
                hiddenContainer.appendChild(neuron);
            }
        }

        function renderSliders() {
            const inSlidersContainer = document.getElementById('input_weights_sliders');
            const hiddenBiasContainer = document.getElementById('hidden_biases_sliders');
            const outSlidersContainer = document.getElementById('hidden_weights_sliders');
            const outBiasContainer = document.getElementById('output_bias_slider');

            inSlidersContainer.innerHTML = '';
            hiddenBiasContainer.innerHTML = '';
            outSlidersContainer.innerHTML = '';
            outBiasContainer.innerHTML = '';

            // Generate Input to Hidden Sliders
            for (let i = 0; i < 2; i++) {
                for (let j = 0; j < numHidden; j++) {
                    inSlidersContainer.appendChild(createSliderMarkup(`w_in_${i}_${j}`, `W(In${i}→H${j})`, 0.0, (val) => {
                        weightsIn[i][j] = val;
                    }));
                }
            }

            // Generate Hidden Bias Sliders
            for (let j = 0; j < numHidden; j++) {
                hiddenBiasContainer.appendChild(createSliderMarkup(`b_hidden_${j}`, `B(H${j})`, 0.0, (val) => {
                    biasesHidden[j] = val;
                }));
            }

            // Generate Hidden to Output Sliders
            for (let j = 0; j < numHidden; j++) {
                outSlidersContainer.appendChild(createSliderMarkup(`w_out_${j}`, `W(H${j}→Out)`, 0.0, (val) => {
                    weightsOut[j] = val;
                }));
            }

            // Output Bias Slider
            outBiasContainer.appendChild(createSliderMarkup(`b_out`, `B(Out)`, 0.0, (val) => {
                biasOut = val;
            }));
        }

        function createSliderMarkup(id, labelText, defaultVal, callback) {
            const wrapper = document.createElement('div');
            wrapper.className = 'slider-wrapper';

            const label = document.createElement('label');
            label.setAttribute('for', id);
            label.textContent = `${labelText}:`;

            const slider = document.createElement('input');
            slider.type = 'range';
            slider.id = id;
            slider.min = '-1';
            slider.max = '1';
            slider.step = '0.1';
            slider.value = defaultVal;

            const valDisplay = document.createElement('span');
            valDisplay.textContent = parseFloat(defaultVal).toFixed(1);

            slider.oninput = (e) => {
                const val = parseFloat(e.target.value);
                valDisplay.textContent = val.toFixed(1);
                callback(val);
                updateNetwork();
            };

            wrapper.appendChild(label);
            wrapper.appendChild(slider);
            wrapper.appendChild(valDisplay);
            return wrapper;
        }

        function renderLinks() {
            const svg = document.getElementById('network_svg');
            svg.innerHTML = '';
            const containerRect = svg.parentElement.getBoundingClientRect();

            function drawLine(fromEl, toEl, weight) {
                if (!fromEl || !toEl || weight === 0) return;
                const a = fromEl.getBoundingClientRect();
                const b = toEl.getBoundingClientRect();
                const x1 = a.left + a.width / 2 - containerRect.left;
                const y1 = a.top + a.height / 2 - containerRect.top;
                const x2 = b.left + b.width / 2 - containerRect.left;
                const y2 = b.top + b.height / 2 - containerRect.top;
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', x1); line.setAttribute('y1', y1);
                line.setAttribute('x2', x2); line.setAttribute('y2', y2);
                line.setAttribute('stroke', weight >= 0 ? '#4CAF50' : '#e53935');
                line.setAttribute('stroke-width', Math.max(0.5, Math.abs(weight) * 4));
                line.setAttribute('stroke-linecap', 'round');
                svg.appendChild(line);
            }

            for (let i = 0; i < 2; i++)
                for (let j = 0; j < numHidden; j++)
                    drawLine(document.getElementById(`input_${i}`), document.getElementById(`hidden_${j}`), weightsIn[i][j]);

            for (let j = 0; j < numHidden; j++)
                drawLine(document.getElementById(`hidden_${j}`), document.getElementById('output_0'), weightsOut[j]);
        }

        // Forward propagation logic
        function updateNetwork() {
            let hiddenStates = new Array(numHidden).fill(0);

            // Calculate Hidden Layer States
            for (let j = 0; j < numHidden; j++) {
                let sum = (inputs[0] * weightsIn[0][j]) + (inputs[1] * weightsIn[1][j]) + biasesHidden[j];
                hiddenStates[j] = sum > 0 ? 1 : 0;

                const neuronEl = document.getElementById(`hidden_${j}`);
                if (neuronEl) {
                    neuronEl.textContent = hiddenStates[j];
                    if (hiddenStates[j] === 1) neuronEl.classList.add('active');
                    else neuronEl.classList.remove('active');
                }
            }

            // Calculate Output Layer State
            let outputSum = biasOut;
            for (let j = 0; j < numHidden; j++) {
                outputSum += hiddenStates[j] * weightsOut[j];
            }

            const finalOutput = outputSum > 0 ? 1 : 0;
            const outputEl = document.getElementById('output_0');
            outputEl.textContent = finalOutput;
            if (finalOutput === 1) outputEl.classList.add('active');
            else outputEl.classList.remove('active');

            renderLinks();
        }

        // Start the engine
        initNetwork();
    </script>
</body>
</html>
