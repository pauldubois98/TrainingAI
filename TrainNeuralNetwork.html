<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neural Network Sandbox</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>

    <h1>NN Sandbox</h1>

    <div class="control-group">
        <span class="layer-size-control">
            <label for="activation_fn">Activation:</label>
            <select id="activation_fn" onchange="onActivationFnChange()">
                <option value="step">Step</option>
                <option value="relu">ReLU</option>
                <option value="sigmoid">Sigmoid</option>
                <option value="tanh">Tanh</option>
                <option value="linear">Linear</option>
            </select>
        </span>
        <span class="layer-size-control">
            <label for="input_value_set">Input values:</label>
            <select id="input_value_set" onchange="onInputSetChange()">
                <option value="binary">Binary {0, 1}</option>
                <option value="ternary">Ternary {−1, 0, 1}</option>
                <option value="custom">Custom…</option>
            </select>
        </span>
        <span class="layer-size-control" id="custom_input_controls" style="display:none;">
            <label for="custom_input_values">Values (comma-separated):</label>
            <input type="text" id="custom_input_values" value="0,1" style="width:8em;" onchange="onCustomInputChange()">
        </span>
    </div>

    <div class="control-group">
        <span class="layer-size-control">
            <label for="num_hidden_layers">Hidden Layers (0–3):</label>
            <input type="number" id="num_hidden_layers" min="0" max="3" value="1" onchange="onNumLayersChange()">
        </span>
        <span id="layer_size_controls"></span>
    </div>

    <div class="network-container">
        <svg id="network_svg"></svg>
        <div id="network_layers" class="network-layers"></div>
    </div>

    <div class="sliders-container">
        <div id="sliders_content"></div>
    </div>

    <script src="network.js"></script>
</body>
</html>
